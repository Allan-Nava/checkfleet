# Example configuration — copy to checkfleet.yml and adapt.
timeout_seconds: 30
retries: 0                 # retry checks that produce ERROR findings (transient net/handshake); 0 = off
retry_backoff_ms: 500      # base backoff between attempts (doubles each retry), used when retries > 0

checks:
  certs:
    warn_days: 30
    crit_days: 7
    port: 443
    targets:
      - github.com
      - example.com:443
    # ansible_inventory: /path/to/inventory   # every host becomes a target on `port`

  http:
    targets:
      - url: https://example.com/
        expect_status: 200
        max_latency_ms: 2000
      - url: https://example.com/health
        expect_status: 200
        expect_body: "ok"

  nats:
    port: 8222                       # NATS monitoring HTTP port
    scheme: http                     # http | https
    # expect_meta_leader: c0-nats-gw-01   # WARN if the meta-leader isn't this node
    # expect_peers:                       # ghost/missing peer detection (optional)
    #   - sg-nats-gw-01
    #   - c0-nats-gw-01
    #   - ov-nats-gw-01
    lag_warn: 100                    # raft peer lag (entries) → WARN
    lag_crit: 1000                   # raft peer lag (entries) → BAD
    targets:
      - 10.21.10.18                  # a JetStream node/gateway (uses `port`)
      - 10.11.10.18:8222
    # ansible_inventory: /path/to/inventory/nats   # every host → monitoring target

  haproxy:
    port: 8404                       # HAProxy stats listener port
    scheme: http                     # http | https
    path: /stats;csv                 # CSV export of the stats page
    session_warn_pct: 80             # WARN when scur/slim ≥ this % (0 = off)
    # auth_user: admin               # optional HTTP basic auth
    # auth_pass_env: HAPROXY_STATS_PASS   # password read from this env var (never inline)
    targets:
      - 10.15.20.106:8404
    # ansible_inventory: /path/to/inventory/haproxy   # every host → stats target

  stream:
    targets:
      - name: canale-live             # optional label (defaults to the URL)
        url: https://cdn.example/live/master.m3u8   # HLS master/media, or DASH .mpd
        live: true                    # check live-edge freshness, warn if VOD
        min_variants: 3               # expected ladder size (0 = skip)
        max_age_warn_seconds: 30      # live-edge age → WARN (default 30 when live)
        max_age_crit_seconds: 60      # live-edge age → BAD  (default 60 when live)
      - name: vod-catalogo
        url: https://cdn.example/vod/movie/master.m3u8
        min_variants: 4               # VOD: just check reachability + ladder

  patroni:
    port: 8008                        # Patroni REST API port
    scheme: http                      # http | https
    lag_warn_bytes: 33554432          # replica lag → WARN (default 32 MiB)
    lag_crit_bytes: 134217728         # replica lag → BAD  (default 128 MiB)
    targets:
      - 10.20.30.11                   # any Patroni node (they proxy the cluster view)
      - 10.20.30.12:8008
    # ansible_inventory: /path/to/inventory/patroni

  consul:
    port: 8500                        # Consul HTTP API port
    scheme: http                      # http | https
    expect_peers: 3                   # WARN if fewer raft peers; BAD if quorum lost
    # token_env: CONSUL_HTTP_TOKEN    # ACL token from this env var (never inline)
    # kv_keys:                        # keys that must exist (missing → BAD)
    #   - config/checkfleet/enabled
    targets:
      - 10.20.30.11                   # any Consul agent (cluster-wide status)
      - 10.20.30.12:8500

  postgres:
    lag_warn_bytes: 33554432          # replica lag → WARN (default 32 MiB)
    lag_crit_bytes: 134217728         # replica lag → BAD  (default 128 MiB)
    conn_warn_pct: 80                 # WARN when connections reach % of max_connections
    wraparound_warn_age: 1500000000   # age(datfrozenxid) → WARN
    wraparound_crit_age: 1900000000   # age(datfrozenxid) → BAD (wraparound at ~2.1e9)
    slot_warn_bytes: 536870912        # inactive slot retained WAL → WARN (512 MiB)
    slot_crit_bytes: 2147483648       # inactive slot retained WAL → BAD  (2 GiB)
    targets:
      - name: pg-prod-primary
        dsn: "host=10.20.30.11 port=5432 user=monitor dbname=postgres sslmode=require"
        password_env: PG_PROD_PASS    # password from this env var, never inline

  dns:
    resolvers:                        # empty → system resolvers (/etc/resolv.conf)
      - 10.20.30.53
      - 8.8.8.8
    min_ttl_seconds: 30               # WARN if any answer TTL is below this (0 = off)
    targets:
      - {name: hiway.media, type: A, expect: ["203.0.113.10"]}   # drift check
      - {name: cdn.hiway.media, type: CNAME}
      - {name: hiway.media, type: SOA}                            # serial drift across resolvers

  redis:
    port: 6379                        # Redis/Valkey port
    # tls: true                       # for rediss / TLS endpoints
    # username: monitor               # optional ACL user
    # password_env: REDIS_PASS        # password from this env var, never inline
    mem_warn_pct: 80                  # WARN when used_memory ≥ % of maxmemory
    lag_warn_bytes: 16777216          # replica offset lag → WARN (16 MiB)
    lag_crit_bytes: 134217728         # replica offset lag → BAD  (128 MiB)
    targets:
      - 10.20.30.40                   # uses `port`
      - 10.20.30.41:6380

  keycloak:
    base_url: https://auth.hiway.media   # scheme+host (+ /auth prefix on old versions), no trailing slash
    health_url: https://auth.hiway.media:9000/health/ready   # optional (often the management port)
    realms:
      - hiway
      - partners

  rabbitmq:
    port: 15672
    username: monitoring
    password_env: RABBITMQ_PASS      # never inline
    queue_warn_depth: 1000
    queue_crit_depth: 50000
    targets:
      - 10.20.30.60

  ntp:
    offset_warn_ms: 100
    offset_crit_ms: 1000
    targets:
      - time.hiway.media
      - 0.pool.ntp.org

  tls:
    warn_days: 30
    crit_days: 7
    targets:
      - auth.hiway.media            # uses port 443
      - api.hiway.media:8443

  tcp:
    targets:
      - {name: ssh-bastion, address: 10.20.30.9:22, expect_banner: "SSH-2.0", max_latency_ms: 500}
      - {name: smtp-relay, address: mail.hiway.media:25}
      - {name: rtmp-ingest, address: ingest.hiway.media:1935}
