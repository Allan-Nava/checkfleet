# Example configuration — copy to checkfleet.yml and adapt.
timeout_seconds: 30

checks:
  certs:
    warn_days: 30
    crit_days: 7
    port: 443
    targets:
      - github.com
      - example.com:443
    # ansible_inventory: /path/to/inventory   # every host becomes a target on `port`

  http:
    targets:
      - url: https://example.com/
        expect_status: 200
        max_latency_ms: 2000
      - url: https://example.com/health
        expect_status: 200
        expect_body: "ok"

  nats:
    port: 8222                       # NATS monitoring HTTP port
    scheme: http                     # http | https
    # expect_meta_leader: c0-nats-gw-01   # WARN if the meta-leader isn't this node
    # expect_peers:                       # ghost/missing peer detection (optional)
    #   - sg-nats-gw-01
    #   - c0-nats-gw-01
    #   - ov-nats-gw-01
    lag_warn: 100                    # raft peer lag (entries) → WARN
    lag_crit: 1000                   # raft peer lag (entries) → BAD
    targets:
      - 10.21.10.18                  # a JetStream node/gateway (uses `port`)
      - 10.11.10.18:8222
    # ansible_inventory: /path/to/inventory/nats   # every host → monitoring target

  haproxy:
    port: 8404                       # HAProxy stats listener port
    scheme: http                     # http | https
    path: /stats;csv                 # CSV export of the stats page
    session_warn_pct: 80             # WARN when scur/slim ≥ this % (0 = off)
    # auth_user: admin               # optional HTTP basic auth
    # auth_pass_env: HAPROXY_STATS_PASS   # password read from this env var (never inline)
    targets:
      - 10.15.20.106:8404
    # ansible_inventory: /path/to/inventory/haproxy   # every host → stats target
