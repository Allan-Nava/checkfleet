name: Desktop tests

# Tests for the desktop app, kept separate from the CLI's ci.yml (which runs
# `go test ./...` at the root and never touches the desktop module). Runs only
# when the desktop app changes.
on:
  push:
    branches: ["main", "master"]
    paths: ["desktop/**", ".github/workflows/desktop-test.yml"]
  pull_request:
    paths: ["desktop/**", ".github/workflows/desktop-test.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Unit tests for the Go bindings (app.go): config loading, running checks,
  # stack discovery, exports — the glue between the GUI and internal/*.
  bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Wails prerequisites
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Test bindings
        working-directory: desktop
        run: |
          go mod tidy
          go test -tags webkit2_41 -v ./...

  # Smoke test the frontend: load it headless (mock backend) and assert the UI
  # actually renders the fleet view — summary + findings table.
  frontend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: chrome
        uses: browser-actions/setup-chrome@v1
      - name: Render and assert
        shell: bash
        run: |
          CHROME='${{ steps.chrome.outputs.chrome-path }}'
          "$CHROME" --headless=new --no-sandbox --disable-gpu \
            --virtual-time-budget=5000 --dump-dom \
            "file://$PWD/desktop/frontend/dist/index.html" > dom.html

          fail() { echo "::error::$1"; echo '--- rendered DOM (head) ---'; head -c 4000 dom.html; exit 1; }
          grep -q 'worst status'        dom.html || fail "summary not rendered"
          grep -q 'worstLabel">ERROR'   dom.html || fail "worst status not computed"
          grep -q 'badge ERROR'         dom.html || fail "status badges not rendered"
          grep -q 'cell-check">stream'  dom.html || fail "findings table not populated"
          grep -q 'live.example.com'    dom.html || fail "finding target not rendered"
          echo "frontend smoke test OK — fleet view renders"

  # End-to-end: build the real Wails binary, launch it headless under Xvfb with
  # a seeded config + auto-run, and assert the actual native webview creates a
  # window and renders (non-blank). Exercises embed + Wails runtime + bindings.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            xvfb xdotool imagemagick
      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Build the app
        working-directory: desktop
        run: |
          go mod tidy
          wails build -tags webkit2_41 -platform linux/amd64 -ldflags "-X main.version=e2e"
      - name: Launch under Xvfb and assert it renders
        run: |
          set -x
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x800x24 >/tmp/xvfb.log 2>&1 &
          sleep 2
          # Software rendering so webkit works without a GPU.
          export GDK_BACKEND=x11
          export LIBGL_ALWAYS_SOFTWARE=1
          export WEBKIT_DISABLE_COMPOSITING_MODE=1
          # WebKitGTK ≥2.42 (shipped by libwebkit2gtk-4.1 on Ubuntu 24.04)
          # defaults to the DMABUF renderer, which paints a blank/black frame
          # under Xvfb's software GL — the window maps but renders nothing.
          # Disabling it makes the webview paint via the software path.
          export WEBKIT_DISABLE_DMABUF_RENDERER=1
          # A reachable TCP target for the tcp check, then open the app on it.
          python3 -m http.server 9999 >/tmp/listener.log 2>&1 &
          printf 'timeout_seconds: 5\nchecks:\n  tcp:\n    targets:\n      - address: "127.0.0.1:9999"\n' > "$PWD/checkfleet.yml"
          export CHECKFLEET_CONFIG="$PWD/checkfleet.yml"
          export CHECKFLEET_AUTORUN=1
          ./desktop/build/bin/checkfleet-desktop >/tmp/app.log 2>&1 &
          APP=$!
          ok=""
          for i in $(seq 1 30); do
            if ! kill -0 "$APP" 2>/dev/null; then echo "::error::app exited early"; cat /tmp/app.log; exit 1; fi
            if xdotool search --name checkfleet >/dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          [ -n "$ok" ] || { echo "::error::app window never appeared"; cat /tmp/app.log; exit 1; }
          # WebKit paint timing varies; poll the screenshot until it's non-blank
          # instead of betting on a single fixed sleep.
          colors=0
          for i in $(seq 1 20); do
            import -window root e2e.png >/dev/null 2>&1 || true
            colors=$(identify -format '%k' e2e.png 2>/dev/null || echo 0)
            echo "attempt $i: unique colors = $colors"
            [ "${colors:-0}" -gt 20 ] && break
            sleep 1
          done
          kill "$APP" 2>/dev/null || true
          [ "${colors:-0}" -gt 20 ] || { echo "::error::window looks blank ($colors colors)"; echo '--- app.log ---'; cat /tmp/app.log; exit 1; }
          echo "E2E OK: the packaged app launched and rendered a non-blank window ($colors colors)"
      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-screenshot
          path: e2e.png
          if-no-files-found: ignore
