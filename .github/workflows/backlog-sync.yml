name: Backlog sync

# Keeps GitHub issues in sync with BACKLOG.md (single source of truth):
# each CF-n item → an issue (label "backlog", grouped by milestone); checking
# an item closes its issue, unchecking reopens it. Idempotent.

on:
  push:
    branches: ["main"]
    paths:
      - "BACKLOG.md"
      - "cmd/backlog-sync/**"
      - "internal/backlog/**"
      - ".github/workflows/backlog-sync.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: backlog-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Sync backlog → issues
        run: go run ./cmd/backlog-sync
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
