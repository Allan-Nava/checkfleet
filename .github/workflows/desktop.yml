name: Desktop (Wails)

# Builds the Wails desktop app and, on a version tag, attaches the executables
# to the GitHub Release that goreleaser (release.yml) creates for that tag.
#
# Kept SEPARATE from release.yml on purpose (CF-18): the desktop build needs the
# web/native toolchain, and if it fails it must NOT block the CLI release. It
# waits for the release to exist, then uploads its assets alongside it.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to build"
        required: false
        default: ""

permissions:
  contents: write # upload assets to the release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            label: darwin_universal
          - os: ubuntu-latest
            platform: linux/amd64
            label: linux_amd64
          - os: windows-latest
            platform: windows/amd64
            label: windows_amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"

      - name: Linux prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Resolve version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${{ github.ref_name }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=$(git describe --tags --always)" >> "$GITHUB_ENV"
          fi

      - name: Build
        shell: bash
        working-directory: desktop
        run: |
          go mod tidy
          TAGS=""
          [ "${{ runner.os }}" = "Linux" ] && TAGS="-tags webkit2_41"
          wails build -platform ${{ matrix.platform }} $TAGS -ldflags "-X main.version=${VERSION}"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd desktop/build/bin
          zip -r -y "../../../checkfleet-desktop_${VERSION}_${{ matrix.label }}.zip" checkfleet.app

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: tar -C desktop/build/bin -czf "checkfleet-desktop_${VERSION}_${{ matrix.label }}.tar.gz" checkfleet-desktop

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd desktop/build/bin
          7z a "../../../checkfleet-desktop_${VERSION}_${{ matrix.label }}.zip" checkfleet-desktop.exe

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: checkfleet-desktop_${{ matrix.label }}
          path: checkfleet-desktop_*.*

      - name: Attach to the release
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # goreleaser (release.yml) runs in parallel — wait until it has created
          # the release, then upload our asset(s) into it.
          for i in $(seq 1 40); do
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "release $TAG is ready"; break
            fi
            echo "waiting for release $TAG to be created ($i/40)…"; sleep 15
          done
          gh release upload "$TAG" checkfleet-desktop_${VERSION}_${{ matrix.label }}.* --clobber
