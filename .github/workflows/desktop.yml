name: Desktop (Wails)

# Manual only: the desktop build needs the Wails/web toolchain and must never
# gate the CLI's push/PR CI or its goreleaser tag release (CF-18). Trigger it by
# hand from the Actions tab when you want desktop bundles.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to build"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
          - os: ubuntu-latest
            platform: linux/amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Linux prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Resolve dependencies
        working-directory: desktop
        run: go mod tidy

      - name: Build
        working-directory: desktop
        run: |
          VERSION="$(git describe --tags --always)"
          wails build -platform ${{ matrix.platform }} -ldflags "-X main.version=${VERSION}"

      - uses: actions/upload-artifact@v4
        with:
          name: checkfleet-desktop-${{ matrix.os }}
          path: desktop/build/bin/*
