name: CI

on:
  push:
    branches: ["master", "main"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...
      - name: English output guardrail (M15/CF-60)
        run: ./scripts/check-english.sh

# Releases (cross-platform archives, checksums, Homebrew formula) are built by
# .github/workflows/release.yml with goreleaser on v* tags.
