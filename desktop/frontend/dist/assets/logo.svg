<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="checkfleet logo">
  <defs>
    <linearGradient id="cf-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#111c34"/>
    </linearGradient>
    <linearGradient id="cf-check" x1="150" y1="360" x2="392" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="0.55" stop-color="#10b981"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="cf-arc" x1="120" y1="140" x2="300" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>

  <!-- app-icon plate -->
  <rect x="8" y="8" width="496" height="496" rx="116" fill="url(#cf-bg)"/>
  <rect x="8.5" y="8.5" width="495" height="495" rx="115.5" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- the 'c': an open arc that cradles the check -->
  <path d="M330 150 A150 150 0 1 0 330 362"
        fill="none" stroke="url(#cf-arc)" stroke-width="34" stroke-linecap="round" stroke-opacity="0.85"/>

  <!-- the check: bold emerald mark -->
  <path d="M172 266 L236 332 L366 164"
        fill="none" stroke="url(#cf-check)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
