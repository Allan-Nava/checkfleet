# Minimal HAProxy config for the checkfleet integration stack.
# Exposes the stats page (and its CSV export at /stats;csv) on :8404, which is
# what the `haproxy` check module scrapes.
global
    maxconn 256

defaults
    mode    http
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s

# A dummy backend so the CSV export lists at least one backend/server row.
backend be_dummy
    server s1 127.0.0.1:1 no-check
