title: checkfleet
description: A fleet of domain-aware infrastructure checks in one Go binary.
url: https://allan-nava.github.io
baseurl: /checkfleet
lang: en
permalink: pretty

# Custom in-repo theme (layouts + SCSS in this folder). No third-party theme gem.
# Public URL: https://allan-nava.github.io/checkfleet/

github:
  repo: https://github.com/Allan-Nava/checkfleet

# jekyll-relative-links rewrites [text](page.md) links to built page URLs, so the
# existing cross-references keep working. jekyll-seo-tag emits <head> meta tags.
plugins:
  - jekyll-relative-links
  - jekyll-seo-tag

# Apply the doc layout to every page unless a page overrides it (index -> home).
defaults:
  - scope:
      path: ""
    values:
      layout: default

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
